{% extends "base.html" %}

{% block title %}编辑文章{% endblock %}

{% block extra_css %}
<style>
.edit-container { max-width: 900px; margin: 0 auto; }
.edit-header { margin-bottom: 18px; padding-bottom: 10px; }
.edit-header h1 { font-size: 20px; margin: 0; color: var(--text-color); }
.form-group { margin-bottom: 16px; }

.edit-title-input,
.edit-content-textarea {
  width: 100%; box-sizing: border-box; padding: 8px 12px; font-size: 14px;
  border: 1px solid var(--border-color); border-radius: 20px; transition: border-color .2s, box-shadow .2s;
  background: var(--bg-color); color: var(--text-color);
}
.edit-content-textarea { min-height: 380px; padding: 12px; line-height: 1.6; resize: vertical; font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', monospace; }
.edit-title-input:focus,
.edit-content-textarea:focus { outline: none; border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(123,63,0,.1); }
body.dark-mode .edit-title-input:focus,
body.dark-mode .edit-content-textarea:focus { box-shadow: 0 0 0 3px rgba(160,82,45,.3); }

.form-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px; padding-top: 16px; }
.btn-cancel { padding: 6px 18px; font-size: 13px; color: var(--text-color); background: var(--hover-bg); border: 1px solid var(--border-color); border-radius: 20px; text-decoration: none; transition: all .2s; }
.btn-cancel:hover { background: var(--border-color); }
.btn-submit { padding: 6px 12px; font-size: 13px; color: #fff; background: var(--primary-color); border: none; border-radius: 20px; cursor: pointer; font-weight: 500; transition: all .2s; }
.btn-submit:hover { background: var(--primary-dark); box-shadow: 0 2px 8px rgba(123,63,0,.2); }
body.dark-mode .btn-submit:hover { box-shadow: 0 2px 8px rgba(160,82,45,.3); }
</style>
{% endblock %}

{% block content %}
<div class="edit-container">
  <div class="edit-header"><h1>编辑文章</h1></div>
  <form action="{{ url_for('update_blog', blog_id=blog['id']) }}" method="POST">
    <div class="form-group">
      <input type="text" name="title" class="edit-title-input" value="{{ blog['title'] }}" required maxlength="100" placeholder="标题">
    </div>
    <div class="form-group">
      <textarea name="content" class="edit-content-textarea" required placeholder="文章内容（支持 Markdown）">{{ blog['content'] }}</textarea>
    </div>
    <div class="form-actions">
      <a href="{{ url_for('blog_detail', blog_id=blog['id']) }}" class="btn-cancel">取消</a>
      <button type="submit" class="btn-submit">更新文章</button>
    </div>
  </form>
</div>
{% endblock %}

{% block scripts %}
<script>
(()=>{
  const form = document.querySelector('form');
  const ta = document.querySelector('.edit-content-textarea');
  const ti = document.querySelector('.edit-title-input');
  ta?.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      if (!ti.value.trim()) { alert('请输入标题'); ti.focus(); return; }
      if (!ta.value.trim()) { alert('请输入文章内容'); ta.focus(); return; }
      form.submit();
    }
  });
  form?.addEventListener('submit', () => {
    localStorage.removeItem('blog_edit_draft_' + window.location.pathname.split('/').pop());
  });
})();
</script>
{% endblock %}
